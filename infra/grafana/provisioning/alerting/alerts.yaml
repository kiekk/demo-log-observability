apiVersion: 1

groups:
  - orgId: 1
    name: app-errors
    folder: Demo
    interval: 1m
    rules:
      - uid: high-error-log-rate
        title: High Error Log Rate
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: loki
            model:
              datasource:
                type: loki
                uid: loki
              expr: |
                sum(count_over_time({job="spring-boot-demo"} | json | level="ERROR" [5m]))
              intervalMs: 60000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
              datasource:
                type: __expr__
                uid: __expr__
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    params: [50]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: []
                  reducer:
                    params: []
                    type: last
                  type: query
              refId: C
              datasource:
                type: __expr__
                uid: __expr__
        for: 1m
        noDataState: OK
        execErrState: OK
        labels:
          severity: warning

      - uid: ai-bot-buggy-service-error
        title: AI Bot - Buggy Service Error
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: loki
            model:
              datasource:
                type: loki
                uid: loki
              expr: |
                sum by (service, commit_sha) (
                  count_over_time({service="demo-buggy-service"} | json | level="ERROR" [5m])
                )
              intervalMs: 60000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
              datasource:
                type: __expr__
                uid: __expr__
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    params: [10]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: []
                  reducer:
                    params: []
                    type: last
                  type: query
              refId: C
              datasource:
                type: __expr__
                uid: __expr__
        for: 30s
        noDataState: OK
        execErrState: OK
        labels:
          severity: critical
          target: ai-bot
