apiVersion: 1

groups:
  - orgId: 1
    name: demo-api-alerts
    folder: Alerts
    interval: 1m
    rules:
      - uid: error-log-spike
        title: High Error Log Rate
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: loki
            model:
              expr: 'sum(count_over_time({job="spring-boot-demo"} | json | level="ERROR" [5m]))'
              queryType: instant
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params: []
                  reducer:
                    params: []
                    type: avg
                  type: query
              datasource:
                name: Expression
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: last
              refId: B
              type: reduce
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 50
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params: []
                  reducer:
                    params: []
                    type: avg
                  type: query
              datasource:
                name: Expression
                type: __expr__
                uid: __expr__
              expression: B
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        dashboardUid: app-logs-overview
        panelId: 2
        noDataState: NoData
        execErrState: Alerting
        for: 1m
        annotations:
          description: 'Error log count exceeded 50 in the last 5 minutes'
          summary: 'High error rate detected in demo-api'
        labels:
          severity: warning
          service: demo-api
