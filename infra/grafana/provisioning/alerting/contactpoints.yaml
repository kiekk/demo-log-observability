apiVersion: 1

contactPoints:
  - orgId: 1
    name: grafana-default-email
    receivers:
      - uid: default-receiver
        type: email
        settings:
          addresses: admin@localhost
        disableResolveMessage: false

  - orgId: 1
    name: ai-bot-webhook
    receivers:
      - uid: ai-bot-webhook
        type: webhook
        settings:
          url: ${AI_BOT_WEBHOOK_URL}
          httpMethod: POST
          username: ''
          password: ''
          authorization_scheme: Bearer
          authorization_credentials: ${WEBHOOK_TOKEN}
          maxAlerts: 0
